<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Editor</title>

    <!-- Quill JS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>

    <!-- Highlight JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- CodeMirror core -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

    <!-- CodeMirror language modes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

    <!-- SortableJS for drag-and-drop reordering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Nunito:wght@400;500;600;700&display=swap');

        /* ─────────────────────────────────────────
     Design tokens — light, editorial palette
  ───────────────────────────────────────── */
        :root {
            --page-bg: #f5f3ee;
            --surface: #ffffff;
            --surface-raised: #faf9f6;
            --border: #e2ddd6;
            --border-strong: #cec8be;

            --text-primary: #1a1814;
            --text-secondary: #6b6560;
            --text-ghost: #b5b0a8;

            --accent: #2d6a4f;
            --accent-light: #e8f4ee;
            --accent-muted: rgba(45, 106, 79, 0.12);

            --code-accent: #9b3a3a;
            --code-light: #fdf0ef;
            --code-muted: rgba(155, 58, 58, 0.1);

            --yellow: #c98a00;
            --yellow-light: #fff8e6;

            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-focus: 0 0 0 3px rgba(45, 106, 79, 0.18);

            --radius: 10px;
            --radius-sm: 6px;
            --radius-xs: 4px;

            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Nunito', sans-serif;
            --font-mono: 'DM Mono', 'Fira Code', monospace;
        }

        /* ─────────────────────────────────────────
     Reset and base
  ───────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--page-bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─────────────────────────────────────────
     Toolbar (injected at top of container)
  ───────────────────────────────────────── */
        .be-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }

        .be-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .be-brand {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .be-brand em {
            font-style: italic;
            color: var(--accent);
        }

        .be-block-count {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-ghost);
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 9px;
        }

        .be-toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ─────────────────────────────────────────
     Buttons
  ───────────────────────────────────────── */
        .be-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 13px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .be-btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border-strong);
        }

        .be-btn-outline:hover {
            background: var(--surface-raised);
            color: var(--text-primary);
        }

        .be-btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .be-btn-primary:hover {
            background: #235c42;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(45, 106, 79, 0.3);
        }

        /* ─────────────────────────────────────────
     Add-block strip
  ───────────────────────────────────────── */
        .be-add-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
        }

        .be-add-strip::before,
        .be-add-strip::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .be-add-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1.5px dashed var(--border-strong);
            background: var(--surface);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.18s ease;
            letter-spacing: 0.2px;
        }

        .be-add-btn:hover {
            border-style: solid;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .be-add-btn.add-text:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .be-add-btn.add-code:hover {
            border-color: var(--code-accent);
            color: var(--code-accent);
            background: var(--code-light);
        }

        /* ─────────────────────────────────────────
     Empty state
  ───────────────────────────────────────── */
        .be-empty {
            text-align: center;
            padding: 56px 20px;
            color: var(--text-ghost);
        }

        .be-empty-icon {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .be-empty h3 {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 4px;
        }

        .be-empty p {
            font-size: 13px;
        }

        /* ─────────────────────────────────────────
     Block wrapper
  ───────────────────────────────────────── */
        .be-block {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
            animation: blockSlideIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes blockSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .be-block:hover {
            border-color: var(--border-strong);
        }

        .be-block.is-focused {
            border-color: var(--accent);
            box-shadow: var(--shadow-focus);
        }

        .sortable-ghost {
            opacity: 0.2;
        }

        .sortable-chosen {
            box-shadow: var(--shadow-md);
        }

        /* ─────────────────────────────────────────
     Block header
  ───────────────────────────────────────── */
        .be-block-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: var(--surface-raised);
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .be-drag-handle {
            cursor: grab;
            color: var(--text-ghost);
            padding: 3px 4px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s;
        }

        .be-drag-handle:hover {
            color: var(--text-secondary);
            background: var(--border);
        }

        .be-drag-handle:active {
            cursor: grabbing;
        }

        .be-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: 0.6px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .badge-text {
            background: var(--accent-muted);
            color: var(--accent);
            border: 1px solid rgba(45, 106, 79, 0.2);
        }

        .badge-code {
            background: var(--code-muted);
            color: var(--code-accent);
            border: 1px solid rgba(155, 58, 58, 0.2);
        }

        .be-lang-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--font-mono);
            border-radius: var(--radius-xs);
            padding: 2px 7px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }

        .be-lang-select:hover,
        .be-lang-select:focus {
            border-color: var(--border-strong);
            color: var(--text-primary);
        }

        .be-label-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: var(--font-body);
            min-width: 0;
        }

        .be-label-input::placeholder {
            color: var(--text-ghost);
        }

        .be-label-input:focus {
            color: var(--text-primary);
        }

        .be-block-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .be-save-status {
            font-size: 10px;
            font-family: var(--font-mono);
            padding: 2px 7px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        .be-save-status.visible {
            opacity: 1;
        }

        .be-save-status.is-saved {
            color: var(--accent);
            background: var(--accent-light);
        }

        .be-save-status.is-changed {
            color: var(--yellow);
            background: var(--yellow-light);
        }

        .be-icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-ghost);
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all 0.14s;
            flex-shrink: 0;
        }

        .be-icon-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .be-icon-btn.btn-save:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .be-icon-btn.btn-delete:hover {
            background: #fdecea;
            color: #c0392b;
        }

        /* ─────────────────────────────────────────
     Text block — Quill theming
  ───────────────────────────────────────── */
        .be-text-body .ql-toolbar {
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background: #fdfcfa;
            padding: 6px 12px;
        }

        .be-text-body .ql-container {
            border: none !important;
        }

        .be-text-body .ql-editor {
            min-height: 120px;
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-primary);
            padding: 16px 18px;
            line-height: 1.75;
        }

        .be-text-body .ql-editor.ql-blank::before {
            color: var(--text-ghost);
            font-style: normal;
            font-size: 14px;
        }

        .ql-snow .ql-stroke {
            stroke: var(--text-secondary) !important;
        }

        .ql-snow .ql-fill {
            fill: var(--text-secondary) !important;
        }

        .ql-snow .ql-picker {
            color: var(--text-secondary) !important;
        }

        .ql-snow .ql-picker-options {
            background: var(--surface) !important;
            border-color: var(--border) !important;
        }

        .ql-toolbar.ql-snow button:hover .ql-stroke,
        .ql-toolbar.ql-snow button.ql-active .ql-stroke {
            stroke: var(--accent) !important;
        }

        .ql-toolbar.ql-snow button:hover .ql-fill,
        .ql-toolbar.ql-snow button.ql-active .ql-fill {
            fill: var(--accent) !important;
        }

        .ql-toolbar.ql-snow .ql-picker-label:hover {
            color: var(--accent) !important;
        }

        /* ─────────────────────────────────────────
     Code block — CodeMirror theming
  ───────────────────────────────────────── */
        .be-code-body {
            position: relative;
        }

        .CodeMirror {
            height: auto !important;
            min-height: 120px;
            background: #fefefe !important;
            color: #24292e !important;
            font-family: var(--font-mono) !important;
            font-size: 13.5px !important;
            line-height: 1.65 !important;
            border-radius: 0 0 calc(var(--radius) - 1.5px) calc(var(--radius) - 1.5px);
        }

        .CodeMirror-scroll {
            min-height: 120px;
        }

        .CodeMirror-gutters {
            background: #f6f8fa !important;
            border-right: 1px solid var(--border) !important;
        }

        .CodeMirror-linenumber {
            color: var(--text-ghost) !important;
            padding: 0 12px 0 10px;
        }

        .CodeMirror-cursor {
            border-left: 2px solid var(--accent) !important;
        }

        .CodeMirror-selected {
            background: rgba(45, 106, 79, 0.1) !important;
        }

        /* ─────────────────────────────────────────
     Output preview panel
  ───────────────────────────────────────── */
        .be-preview-panel {
            display: none;
            border-top: 1px solid var(--border);
            background: #fdfcf9;
            border-radius: 0 0 calc(var(--radius) - 1.5px) calc(var(--radius) - 1.5px);
            overflow: hidden;
        }

        .be-preview-panel.is-open {
            display: block;
        }

        .be-preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-ghost);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: var(--surface-raised);
        }

        .be-preview-content {
            padding: 16px 18px;
            font-family: var(--font-body);
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        /* Code preview (prv-cb format as requested) */
        .be-preview-content .prv-cb {
            border: 1px solid #d0d7de;
            border-radius: 8px;
            overflow: hidden;
            background: #f6f8fa;
            font-family: var(--font-mono);
        }

        .be-preview-content .prv-cb-h {
            background: #eaeef2;
            padding: 7px 16px;
            border-bottom: 1px solid #d0d7de;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .be-preview-content .prv-cb-h span {
            font-size: 11px;
            font-family: var(--font-mono);
            color: #57606a;
            font-weight: 500;
        }

        .be-preview-content .prv-cb pre {
            margin: 0;
            overflow-x: auto;
        }

        .be-preview-content .prv-cb pre code {
            display: block;
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.6;
            font-family: var(--font-mono);
            background: transparent;
        }

        /* Text preview typography */
        .be-preview-content h1 {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .be-preview-content h2 {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .be-preview-content p {
            margin-bottom: 8px;
        }

        .be-preview-content ul,
        .be-preview-content ol {
            padding-left: 22px;
            margin-bottom: 8px;
        }

        /* ─────────────────────────────────────────
     Toast notifications
  ───────────────────────────────────────── */
        .be-toast-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 9999;
        }

        .be-toast {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 9px 14px;
            font-size: 13px;
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow-md);
            animation: toastIn 0.18s ease;
            color: var(--text-primary);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .be-toast.toast-success::before {
            content: '✓';
            color: var(--accent);
            font-weight: 700;
        }

        /* ─────────────────────────────────────────
     Scrollbar
  ───────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- Demo page wrapper -->
    <div style="max-width:820px; margin:40px auto; padding:0 20px 80px;">
        <div id="editor-container"></div>
    </div>

    <!-- Global toast container (one per page) -->
    <div class="be-toast-box" id="be-global-toasts"></div>


    <!-- ═══════════════════════════════════════════════════════
     BlockEditor class
     
     Embed anywhere:
       HTML:  <div id="editor-container"></div>
       JS:    const editor = new BlockEditor("#editor-container");
     
     Callbacks:
       editor.onSave((block) => { ... })
       editor.onSaveAll((blocks) => { ... })
     
     Data loading:
       editor.load([ { type, label?, content?, language? } ])
     
     Data reading:
       editor.getAll() => [ { id, type, order, label, content } ]
     
     Block content is always returned as HTML string.
═══════════════════════════════════════════════════════ -->
    <script>

        class BlockEditor {

            // Supported languages for code blocks
            static LANGUAGES = [
                { value: 'javascript', label: 'JavaScript', cmMode: 'javascript' },
                { value: 'typescript', label: 'TypeScript', cmMode: 'javascript' },
                { value: 'python', label: 'Python', cmMode: 'python' },
                { value: 'html', label: 'HTML', cmMode: 'htmlmixed' },
                { value: 'css', label: 'CSS', cmMode: 'css' },
                { value: 'java', label: 'Java', cmMode: 'clike' },
                { value: 'cpp', label: 'C++', cmMode: 'clike' },
                { value: 'bash', label: 'Bash', cmMode: 'shell' },
                { value: 'plaintext', label: 'Plain Text', cmMode: null },
            ];

            constructor(selector) {
                this.mountPoint = document.querySelector(selector);
                this.blocks = [];   // array of block data objects
                this.idCounter = 0;

                this._onSaveCallback = null;
                this._onSaveAllCallback = null;

                // Give this instance a short unique ID so multiple editors can coexist
                this._uid = Math.random().toString(36).slice(2, 7);

                this._buildShell();
                this._initDragAndDrop();
                this._showEmptyState();
                this._refreshBlockCount();
            }


            /* ════════════════════════════════════════
               Public API
            ════════════════════════════════════════ */

            /**
             * Register a callback for when a single block is saved.
             * The callback receives: { id, type, order, label, content }
             */
            onSave(callback) {
                this._onSaveCallback = callback;
                return this; // chainable
            }

            /**
             * Register a callback for when "Save All" is clicked.
             * The callback receives an array of { id, type, order, label, content }.
             */
            onSaveAll(callback) {
                this._onSaveAllCallback = callback;
                return this; // chainable
            }

            /**
             * Pre-populate the editor from a JSON array.
             * Each item: { type, label?, language?, content? }
             * content for text blocks = HTML string
             * content for code blocks = plain code string
             */
            load(blockArray) {
                blockArray.forEach(item => {
                    const block = this._insertBlock(
                        item.type,
                        item.language || 'javascript',
                        item.label || ''
                    );
                    // Populate content after the editor is ready
                    setTimeout(() => {
                        if (!item.content) return;
                        if (item.type === 'text' && block.quill) {
                            block.quill.clipboard.dangerouslyPasteHTML(item.content);
                        }
                        if (item.type === 'code' && block.cm) {
                            // If content came from a previous save it might be HTML — strip tags
                            const plainCode = item.content.replace(/<[^>]*>/g, '');
                            block.cm.setValue(plainCode);
                        }
                    }, 80);
                });
                return this;
            }

            /**
             * Return all blocks in current DOM order as a JSON array.
             * Shape: [ { id, type, order, label, content } ]
             */
            getAll() {
                return this._getBlocksInDomOrder().map((block, index) => ({
                    id: block.id,
                    type: block.type,
                    order: index + 1,
                    label: this._readLabel(block.id),
                    content: this._buildHtmlOutput(block),
                }));
            }


            /* ════════════════════════════════════════
               Shell / chrome construction
            ════════════════════════════════════════ */

            _buildShell() {
                // Toolbar
                this.toolbar = document.createElement('div');
                this.toolbar.className = 'be-toolbar';
                this.toolbar.innerHTML = `
      <div class="be-toolbar-left">
        <span class="be-brand">Block<em>Ed</em></span>
        <span class="be-block-count" id="be-count-${this._uid}">0 blocks</span>
      </div>
      <div class="be-toolbar-right">
        <button class="be-btn be-btn-outline" id="be-export-${this._uid}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <button class="be-btn be-btn-primary" id="be-saveall-${this._uid}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17,21 17,13 7,13 7,21"/>
            <polyline points="7,3 7,8 15,8"/>
          </svg>
          Save All
        </button>
      </div>
    `;

                // Blocks list (Sortable attaches here)
                this.listEl = document.createElement('div');
                this.listEl.className = 'be-blocks-list';

                // Add-block strip at the bottom
                this.addStrip = document.createElement('div');
                this.addStrip.className = 'be-add-strip';
                this.addStrip.innerHTML = `
      <button class="be-add-btn add-text">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M4 6h16M4 12h16M4 18h7"/>
        </svg>
        Text Block
      </button>
      <button class="be-add-btn add-code">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="16,18 22,12 16,6"/>
          <polyline points="8,6 2,12 8,18"/>
        </svg>
        Code Block
      </button>
    `;

                this.mountPoint.appendChild(this.toolbar);
                this.mountPoint.appendChild(this.listEl);
                this.mountPoint.appendChild(this.addStrip);

                // Button events
                this.toolbar.querySelector(`#be-saveall-${this._uid}`).addEventListener('click', () => this._handleSaveAll());
                this.toolbar.querySelector(`#be-export-${this._uid}`).addEventListener('click', () => this._handleExport());
                this.addStrip.querySelector('.add-text').addEventListener('click', () => this._addBlock('text'));
                this.addStrip.querySelector('.add-code').addEventListener('click', () => this._addBlock('code'));
            }

            _initDragAndDrop() {
                Sortable.create(this.listEl, {
                    handle: '.be-drag-handle',
                    animation: 160,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    onEnd: () => this._refreshBlockCount(),
                });
            }


            /* ════════════════════════════════════════
               Adding / creating blocks
            ════════════════════════════════════════ */

            _addBlock(type) {
                this._removeEmptyState();
                const block = this._insertBlock(type, 'javascript', '');
                // Focus the new editor
                setTimeout(() => {
                    if (type === 'text' && block.quill) block.quill.focus();
                    if (type === 'code' && block.cm) block.cm.focus();
                }, 120);
                return block;
            }

            _insertBlock(type, language, label) {
                const id = ++this.idCounter;
                const block = { id, type, language, quill: null, cm: null };
                this.blocks.push(block);

                const el = this._renderBlockElement(block, label);
                this.listEl.appendChild(el);

                // Init the editor inside after a short delay (lets DOM settle)
                setTimeout(() => {
                    if (type === 'text') this._mountQuill(block, el);
                    else this._mountCodeMirror(block, el);
                }, 20);

                this._refreshBlockCount();
                return block;
            }


            /* ════════════════════════════════════════
               Block element HTML
            ════════════════════════════════════════ */

            _renderBlockElement(block, label = '') {
                const { id, type } = block;
                const isCode = type === 'code';

                const languageOptions = BlockEditor.LANGUAGES.map(lang =>
                    `<option value="${lang.value}" ${lang.value === block.language ? 'selected' : ''}>${lang.label}</option>`
                ).join('');

                const el = document.createElement('div');
                el.className = 'be-block';
                el.dataset.blockId = id;

                el.innerHTML = `
      <div class="be-block-header">

        <div class="be-drag-handle" title="Drag to reorder">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="9"  cy="5"  r="1.6"/>
            <circle cx="15" cy="5"  r="1.6"/>
            <circle cx="9"  cy="12" r="1.6"/>
            <circle cx="15" cy="12" r="1.6"/>
            <circle cx="9"  cy="19" r="1.6"/>
            <circle cx="15" cy="19" r="1.6"/>
          </svg>
        </div>

        <span class="be-type-badge ${isCode ? 'badge-code' : 'badge-text'}">
          ${isCode ? '&lt;/&gt; code' : '&para; text'}
        </span>

        ${isCode ? `<select class="be-lang-select" data-action="lang" data-id="${id}">${languageOptions}</select>` : ''}

        <input
          class="be-label-input"
          type="text"
          placeholder="Label this block…"
          value="${label}"
          data-action="label"
          data-id="${id}"
        />

        <div class="be-block-controls">
          <span class="be-save-status" data-action="status" data-id="${id}"></span>

          <button class="be-icon-btn" data-action="preview" data-id="${id}" title="Toggle output preview">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>

          <button class="be-icon-btn btn-save" data-action="save" data-id="${id}" title="Save this block">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
              <polyline points="17,21 17,13 7,13 7,21"/>
              <polyline points="7,3 7,8 15,8"/>
            </svg>
          </button>

          <button class="be-icon-btn btn-delete" data-action="delete" data-id="${id}" title="Delete this block">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3,6 5,6 21,6"/>
              <path d="M19,6l-1,14a2,2,0,01-2,2H8a2,2,0,01-2-2L5,6"/>
              <path d="M10,11v6M14,11v6"/>
              <path d="M9,6V4a1,1,0,011-1h4a1,1,0,011,1v2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Editor mount point -->
      <div class="be-block-body" data-body="${id}">
        ${isCode
                        ? `<div class="be-code-body"><textarea data-cm="${id}"></textarea></div>`
                        : `<div class="be-text-body"><div data-quill="${id}"></div></div>`
                    }
      </div>

      <!-- Output preview panel (hidden by default) -->
      <div class="be-preview-panel" data-preview-panel="${id}">
        <div class="be-preview-header">
          <span>output preview</span>
          <button class="be-icon-btn" data-action="preview" data-id="${id}" title="Close" style="width:18px;height:18px;font-size:11px">✕</button>
        </div>
        <div class="be-preview-content" data-preview-content="${id}"></div>
      </div>
    `;

                this._wireBlockEvents(el);
                return el;
            }

            _wireBlockEvents(el) {
                el.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;

                    const action = btn.dataset.action;
                    const id = Number(btn.dataset.id);

                    if (action === 'save') this._handleSave(id);
                    if (action === 'delete') this._handleDelete(id);
                    if (action === 'preview') this._handleTogglePreview(id);
                });

                el.addEventListener('change', (e) => {
                    const sel = e.target.closest('[data-action="lang"]');
                    if (!sel) return;
                    const id = Number(sel.dataset.id);
                    const block = this._findBlock(id);
                    if (!block) return;
                    block.language = sel.value;
                    const langDef = BlockEditor.LANGUAGES.find(l => l.value === block.language);
                    if (block.cm) block.cm.setOption('mode', langDef?.cmMode || null);
                    this._markChanged(id);
                });
            }


            /* ════════════════════════════════════════
               Editor mounting
            ════════════════════════════════════════ */

            _mountQuill(block, el) {
                const mountPoint = el.querySelector(`[data-quill="${block.id}"]`);
                if (!mountPoint) return;

                block.quill = new Quill(mountPoint, {
                    theme: 'snow',
                    placeholder: 'Start writing here…',
                    modules: {
                        toolbar: [
                            [{ header: [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ list: 'ordered' }, { list: 'bullet' }],
                            ['blockquote', 'link'],
                            ['clean'],
                        ],
                    },
                });

                block.quill.on('text-change', () => this._markChanged(block.id));

                // Focus ring on the outer block card
                const body = el.querySelector(`[data-body="${block.id}"]`);
                body.addEventListener('focusin', () => el.classList.add('is-focused'));
                body.addEventListener('focusout', () => el.classList.remove('is-focused'));
            }

            _mountCodeMirror(block, el) {
                const textarea = el.querySelector(`[data-cm="${block.id}"]`);
                if (!textarea) return;

                const langDef = BlockEditor.LANGUAGES.find(l => l.value === block.language);

                block.cm = CodeMirror.fromTextArea(textarea, {
                    mode: langDef?.cmMode || null,
                    lineNumbers: true,
                    indentUnit: 2,
                    tabSize: 2,
                    indentWithTabs: false,
                    lineWrapping: false,
                });

                block.cm.on('change', () => this._markChanged(block.id));
                block.cm.on('focus', () => el.classList.add('is-focused'));
                block.cm.on('blur', () => el.classList.remove('is-focused'));
            }


            /* ════════════════════════════════════════
               Save handlers
            ════════════════════════════════════════ */

            _handleSave(id) {
                const block = this._findBlock(id);
                if (!block) return;

                const result = {
                    id: id,
                    type: block.type,
                    order: this._getBlockOrder(id),
                    label: this._readLabel(id),
                    content: this._buildHtmlOutput(block),
                };

                this._setStatus(id, 'saved');

                // Refresh preview if it's currently open
                const previewPanel = this.listEl.querySelector(`[data-preview-panel="${id}"]`);
                if (previewPanel?.classList.contains('is-open')) {
                    this._writePreviewContent(id, result.content);
                }

                if (this._onSaveCallback) this._onSaveCallback(result);

                this._toast(`Block #${id} saved`);
                return result;
            }

            _handleSaveAll() {
                if (this.blocks.length === 0) {
                    this._toast('No blocks to save');
                    return;
                }

                const allBlocks = this.getAll();
                allBlocks.forEach(b => this._setStatus(b.id, 'saved'));

                if (this._onSaveAllCallback) this._onSaveAllCallback(allBlocks);

                this._toast(`Saved ${allBlocks.length} block${allBlocks.length !== 1 ? 's' : ''}`);
                return allBlocks;
            }

            _handleExport() {
                if (this.blocks.length === 0) { this._toast('Nothing to export'); return; }

                const html = this.getAll().map(b =>
                    `<!-- Block ${b.order} | id=${b.id} | type=${b.type} | label="${b.label}" -->\n${b.content}`
                ).join('\n\n');

                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                Object.assign(document.createElement('a'), { href: url, download: 'blocks.html' }).click();
                URL.revokeObjectURL(url);
                this._toast('Exported as blocks.html');
            }


            /* ════════════════════════════════════════
               Delete
            ════════════════════════════════════════ */

            _handleDelete(id) {
                const idx = this.blocks.findIndex(b => b.id === id);
                if (idx === -1) return;

                this.blocks.splice(idx, 1);

                const el = this.listEl.querySelector(`[data-block-id="${id}"]`);
                if (el) {
                    el.style.cssText = 'opacity:0; transform:scale(0.97); transition:all 0.15s ease;';
                    setTimeout(() => { el.remove(); this._showEmptyState(); this._refreshBlockCount(); }, 160);
                }
            }


            /* ════════════════════════════════════════
               Preview panel
            ════════════════════════════════════════ */

            _handleTogglePreview(id) {
                const panel = this.listEl.querySelector(`[data-preview-panel="${id}"]`);
                if (!panel) return;

                const nowOpen = !panel.classList.contains('is-open');
                panel.classList.toggle('is-open', nowOpen);

                if (nowOpen) {
                    const block = this._findBlock(id);
                    const content = this._buildHtmlOutput(block);
                    this._writePreviewContent(id, content);
                }
            }

            _writePreviewContent(id, html) {
                const target = this.listEl.querySelector(`[data-preview-content="${id}"]`);
                if (target) target.innerHTML = html;
            }


            /* ════════════════════════════════════════
               HTML output builder
            ════════════════════════════════════════ */

            _buildHtmlOutput(block) {
                if (block.type === 'text') {
                    return block.quill ? block.quill.root.innerHTML : '';
                }

                if (block.type === 'code') {
                    if (!block.cm) return '';

                    const rawCode = block.cm.getValue();
                    const lang = block.language || 'plaintext';

                    let highlighted;
                    try {
                        highlighted = (lang === 'plaintext')
                            ? hljs.highlightAuto(rawCode).value
                            : hljs.highlight(rawCode, { language: this._mapToHljsLang(lang), ignoreIllegals: true }).value;
                    } catch (_) {
                        highlighted = hljs.highlightAuto(rawCode).value;
                    }

                    // Returns the exact prv-cb format the user requested
                    return `<div class="prv-cb"><div class="prv-cb-h"><span>${lang}</span></div><pre><code class="hljs language-${lang}">${highlighted}</code></pre></div>`;
                }

                return '';
            }

            // Our lang values mostly match hljs, except a couple
            _mapToHljsLang(lang) {
                const overrides = { cpp: 'cpp', bash: 'bash', typescript: 'typescript' };
                return overrides[lang] || lang;
            }


            /* ════════════════════════════════════════
               Status indicator
            ════════════════════════════════════════ */

            _markChanged(id) {
                const el = this.listEl.querySelector(`[data-action="status"][data-id="${id}"]`);
                if (!el) return;
                el.textContent = 'unsaved';
                el.className = 'be-save-status visible is-changed';
                clearTimeout(el._timer);
            }

            _setStatus(id, state /* 'saved' | 'changed' */) {
                const el = this.listEl.querySelector(`[data-action="status"][data-id="${id}"]`);
                if (!el) return;

                if (state === 'saved') {
                    el.textContent = 'saved';
                    el.className = 'be-save-status visible is-saved';
                    clearTimeout(el._timer);
                    el._timer = setTimeout(() => el.classList.remove('visible'), 2200);
                } else {
                    el.textContent = 'unsaved';
                    el.className = 'be-save-status visible is-changed';
                }
            }


            /* ════════════════════════════════════════
               DOM order helpers
            ════════════════════════════════════════ */

            // Returns blocks array sorted by current DOM order
            _getBlocksInDomOrder() {
                const domEls = [...this.listEl.querySelectorAll('.be-block')];
                return domEls
                    .map(el => this._findBlock(Number(el.dataset.blockId)))
                    .filter(Boolean);
            }

            // 1-based position of a block in the current DOM order
            _getBlockOrder(id) {
                const ordered = this._getBlocksInDomOrder();
                const idx = ordered.findIndex(b => b.id === id);
                return idx === -1 ? null : idx + 1;
            }

            _findBlock(id) {
                return this.blocks.find(b => b.id === id) || null;
            }

            _readLabel(id) {
                const input = this.listEl.querySelector(`[data-action="label"][data-id="${id}"]`);
                return input ? input.value.trim() : '';
            }


            /* ════════════════════════════════════════
               UI helpers
            ════════════════════════════════════════ */

            _showEmptyState() {
                this._removeEmptyState();
                if (this.blocks.length === 0) {
                    const el = document.createElement('div');
                    el.id = 'be-empty';
                    el.className = 'be-empty';
                    el.innerHTML = `
        <div class="be-empty-icon">✦</div>
        <h3>No blocks yet</h3>
        <p>Add a text or code block to get started</p>
      `;
                    this.listEl.appendChild(el);
                }
            }

            _removeEmptyState() {
                this.listEl.querySelector('#be-empty')?.remove();
            }

            _refreshBlockCount() {
                const el = this.mountPoint.querySelector(`#be-count-${this._uid}`);
                if (el) el.textContent = `${this.blocks.length} block${this.blocks.length !== 1 ? 's' : ''}`;
            }

            _toast(message) {
                const box = document.getElementById('be-global-toasts');
                if (!box) return;
                const t = document.createElement('div');
                t.className = 'be-toast toast-success';
                t.textContent = message;
                box.appendChild(t);
                setTimeout(() => {
                    t.style.cssText = 'opacity:0; transform:translateY(6px); transition:all 0.18s ease;';
                    setTimeout(() => t.remove(), 200);
                }, 2500);
            }

        } // end class BlockEditor


        /* ═══════════════════════════════════════════
           Demo — initialise on this page
        ═══════════════════════════════════════════ */

        const editor = new BlockEditor("#editor-container");

        // Called every time a single block's Save button is clicked
        editor.onSave((block) => {
            console.group(`💾 Block Saved`);
            console.log("Block id    ::", block.id);
            console.log("Block type  ::", block.type);
            console.log("Block order ::", block.order);
            console.log("Block label ::", block.label);
            console.log("Block output::", block.content);
            console.groupEnd();
        });

        // Called when the Save All button is clicked — receives full array
        editor.onSaveAll((blocks) => {
            console.group(`💾 Save All — ${blocks.length} block(s)`);
            console.table(blocks.map(b => ({ id: b.id, type: b.type, order: b.order, label: b.label })));
            console.log("Full JSON ::", blocks);
            console.groupEnd();
        });

        // Pre-load blocks on page init from a JSON array
        editor.load([
            {
                type: 'text',
                label: 'Introduction',
                content: '<h2>Welcome to BlockEd</h2><p>Each block is independently editable and saves its content as HTML. Drag the <strong>⠿ handle</strong> to reorder blocks.</p>',
            },
            {
                type: 'code',
                label: 'Quick start',
                language: 'javascript',
                content: 'const editor = new BlockEditor("#editor-container");\n\neditor.onSave((block) => {\n  console.log("Block id    ::", block.id);\n  console.log("Block type  ::", block.type);\n  console.log("Block order ::", block.order);\n  console.log("Block output::", block.content);\n});\n\neditor.onSaveAll((blocks) => {\n  console.log("All blocks ::", blocks);\n});',
            },
        ]);

    </script>
</body>

</html>
