<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Editor</title>

<!-- Quill JS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>

<!-- Highlight JS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- CodeMirror for code editing -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171b;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --border2: #35353f;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3f3f4e;
    --accent: #7c6af7;
    --accent2: #5b4fcf;
    --accent-glow: rgba(124, 106, 247, 0.15);
    --green: #4ade80;
    --green-dim: rgba(74, 222, 128, 0.1);
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,17,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-title span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,106,247,0.3); }

  /* ── Main layout ── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 120px;
  }

  /* ── Block container ── */
  #blocks-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Block ── */
  .block {
    position: relative;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: blockIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes blockIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .block:hover { border-color: var(--border2); }
  .block.focused { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  /* ── Block Header ── */
  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    border-radius: var(--radius) var(--radius) 0 0;
    gap: 8px;
  }

  .block-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .drag-handle {
    color: var(--text-dim);
    cursor: grab;
    padding: 2px 4px;
    border-radius: 4px;
    display: flex; align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .drag-handle:hover { color: var(--text-muted); background: var(--border); }
  .drag-handle:active { cursor: grabbing; }

  .block-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .badge-text {
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.25);
  }

  .badge-code {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.2);
  }

  .block-label-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    min-width: 0;
  }
  .block-label-input::placeholder { color: var(--text-dim); }
  .block-label-input:focus { color: var(--text); }

  .block-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.danger:hover { background: rgba(248,113,113,0.12); color: var(--red); }
  .icon-btn.save-btn { color: var(--green); }
  .icon-btn.save-btn:hover { background: var(--green-dim); }

  /* ── Saved indicator ── */
  .save-status {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-status.show { opacity: 1; }
  .save-status.saved { color: var(--green); background: var(--green-dim); }
  .save-status.changed { color: var(--yellow); background: rgba(251,191,36,0.1); }

  /* ── Code block language selector ── */
  .lang-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    border-radius: 5px;
    padding: 3px 8px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  .lang-select:hover, .lang-select:focus { border-color: var(--border2); color: var(--text); }

  /* ── Text block (Quill) ── */
  .text-block-body { padding: 0; }

  .text-block-body .ql-container { border: none !important; }
  .text-block-body .ql-toolbar {
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    background: var(--surface2);
    padding: 6px 12px;
  }
  .text-block-body .ql-editor {
    min-height: 120px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    padding: 16px 18px;
    line-height: 1.7;
  }
  .text-block-body .ql-editor.ql-blank::before {
    color: var(--text-dim);
    font-style: normal;
    font-size: 14px;
  }

  /* Quill toolbar theming */
  .ql-snow .ql-stroke { stroke: var(--text-muted) !important; }
  .ql-snow .ql-fill { fill: var(--text-muted) !important; }
  .ql-snow .ql-picker { color: var(--text-muted) !important; }
  .ql-snow .ql-picker-options { background: var(--surface2) !important; border-color: var(--border) !important; }
  .ql-snow .ql-picker-item { color: var(--text-muted) !important; }
  .ql-toolbar.ql-snow button:hover .ql-stroke,
  .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: var(--accent) !important; }
  .ql-toolbar.ql-snow button:hover .ql-fill,
  .ql-toolbar.ql-snow button.ql-active .ql-fill { fill: var(--accent) !important; }
  .ql-toolbar.ql-snow .ql-picker-label:hover,
  .ql-toolbar.ql-snow .ql-picker-label.ql-active { color: var(--accent) !important; }

  /* ── Code block ── */
  .code-block-body { padding: 0; position: relative; }

  .CodeMirror {
    height: auto !important;
    min-height: 120px;
    background: #1a1a22 !important;
    color: var(--text) !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13.5px !important;
    line-height: 1.6 !important;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .CodeMirror-scroll { min-height: 120px; }
  .CodeMirror-gutters { background: #15151c !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--text-dim) !important; padding: 0 12px 0 8px; }
  .CodeMirror-cursor { border-left: 2px solid var(--accent) !important; }
  .CodeMirror-selected { background: rgba(124,106,247,0.15) !important; }

  /* ── Output preview ── */
  .block-output {
    border-top: 1px solid var(--border);
    background: var(--bg);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
    display: none;
  }
  .block-output.show { display: block; }

  .output-label {
    padding: 7px 14px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .output-content {
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* Code preview styles matching requested format */
  .output-content .prv-cb {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #282c34;
    font-family: 'JetBrains Mono', monospace;
  }
  .output-content .prv-cb-h {
    background: #21252b;
    padding: 8px 16px;
    border-bottom: 1px solid #3a3f4b;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .output-content .prv-cb-h span {
    font-size: 12px;
    color: #abb2bf;
    font-family: 'JetBrains Mono', monospace;
    text-transform: lowercase;
  }
  .output-content .prv-cb pre {
    margin: 0;
    padding: 16px;
    overflow-x: auto;
  }
  .output-content .prv-cb pre code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: none;
    padding: 0;
  }

  /* Text preview */
  .output-content h1 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 10px; }
  .output-content h2 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 8px; }
  .output-content p { margin-bottom: 8px; }
  .output-content ul, .output-content ol { padding-left: 20px; margin-bottom: 8px; }
  .output-content strong { color: #fff; }
  .output-content em { color: var(--text-muted); }

  /* ── Add block area ── */
  .add-block-area {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .add-divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .add-divider::before, .add-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .add-block-btns {
    display: flex;
    gap: 10px;
  }

  .add-block-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .add-block-btn:hover {
    background: var(--surface);
    border-style: solid;
  }
  .add-block-btn.text-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-block-btn.code-btn:hover { border-color: var(--green); color: var(--green); }

  .add-block-btn .btn-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .text-btn .btn-icon { background: var(--accent-glow); }
  .code-btn .btn-icon { background: var(--green-dim); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text-muted); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* ── Notification toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: toastIn 0.2s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast.success { border-color: rgba(74,222,128,0.3); }
  .toast.success::before { content: '✓'; color: var(--green); font-weight: 700; }

  /* ── Block count badge ── */
  .block-count {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">✦</div>
    <span class="header-title">Block<span>Ed</span></span>
  </div>
  <div class="header-actions">
    <span class="block-count" id="block-count">0 blocks</span>
    <button class="btn btn-ghost" onclick="exportAllBlocks()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export All
    </button>
    <button class="btn btn-primary" onclick="saveAllBlocks()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
      Save All
    </button>
  </div>
</div>

<div class="main">
  <div id="blocks-container"></div>

  <div class="add-block-area" id="add-block-area">
    <div class="add-divider">Add Block</div>
    <div class="add-block-btns">
      <button class="add-block-btn text-btn" onclick="addBlock('text')">
        <div class="btn-icon">T</div>
        Text Block
      </button>
      <button class="add-block-btn code-btn" onclick="addBlock('code')">
        <div class="btn-icon">&lt;/&gt;</div>
        Code Block
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  // ── State ──
  const blocks = [];
  let blockCounter = 0;

  const LANGUAGES = [
    { value: 'javascript', label: 'JavaScript', cm: 'javascript' },
    { value: 'typescript', label: 'TypeScript', cm: 'javascript' },
    { value: 'python',     label: 'Python',     cm: 'python' },
    { value: 'html',       label: 'HTML',       cm: 'htmlmixed' },
    { value: 'css',        label: 'CSS',        cm: 'css' },
    { value: 'java',       label: 'Java',       cm: 'clike' },
    { value: 'cpp',        label: 'C++',        cm: 'clike' },
    { value: 'bash',       label: 'Bash',       cm: 'shell' },
    { value: 'plaintext',  label: 'Plain Text', cm: null },
  ];

  // ── Add Block ──
  function addBlock(type) {
    const id = ++blockCounter;
    const block = { id, type, quill: null, cm: null, saved: false, language: 'javascript' };
    blocks.push(block);

    const el = createBlockElement(block);
    document.getElementById('blocks-container').appendChild(el);
    updateEmptyState();
    updateBlockCount();

    // Focus
    setTimeout(() => {
      if (type === 'text' && block.quill) block.quill.focus();
      if (type === 'code' && block.cm) block.cm.focus();
    }, 100);
  }

  // ── Create Block DOM ──
  function createBlockElement(block) {
    const wrap = document.createElement('div');
    wrap.className = 'block';
    wrap.id = `block-${block.id}`;

    const langOptions = LANGUAGES.map(l =>
      `<option value="${l.value}" ${l.value === block.language ? 'selected' : ''}>${l.label}</option>`
    ).join('');

    const isCode = block.type === 'code';

    wrap.innerHTML = `
      <div class="block-header">
        <div class="block-header-left">
          <div class="drag-handle" title="Drag to reorder">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>
          </div>
          <span class="block-type-badge ${isCode ? 'badge-code' : 'badge-text'}">
            ${isCode ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg> Code' : '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h7"/></svg> Text'}
          </span>
          ${isCode ? `<select class="lang-select" onchange="changeLanguage(${block.id}, this.value)">${langOptions}</select>` : ''}
          <input class="block-label-input" type="text" placeholder="Block label (optional)" />
        </div>
        <div class="block-actions">
          <span class="save-status" id="status-${block.id}">saved</span>
          <button class="icon-btn" title="Preview output" onclick="togglePreview(${block.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="icon-btn save-btn" title="Save this block" onclick="saveBlock(${block.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
          </button>
          <button class="icon-btn danger" title="Delete block" onclick="deleteBlock(${block.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,01-2,2H8a2,2,0,01-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,011-1h4a1,1,0,011,1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-body" id="body-${block.id}">
        ${isCode
          ? `<div class="code-block-body"><textarea id="cm-${block.id}"></textarea></div>`
          : `<div class="text-block-body"><div id="quill-${block.id}"></div></div>`
        }
      </div>
      <div class="block-output" id="output-${block.id}">
        <div class="output-label">
          <span>⟨ output preview ⟩</span>
          <button class="icon-btn" style="width:20px;height:20px;font-size:11px" onclick="togglePreview(${block.id})" title="Close">✕</button>
        </div>
        <div class="output-content" id="output-content-${block.id}"></div>
      </div>
    `;

    // Init editor after DOM insert
    setTimeout(() => {
      if (block.type === 'text') initQuill(block, wrap);
      else initCodeMirror(block, wrap);
    }, 10);

    return wrap;
  }

  // ── Init Quill ──
  function initQuill(block, wrap) {
    const el = wrap.querySelector(`#quill-${block.id}`);
    if (!el) return;
    block.quill = new Quill(el, {
      theme: 'snow',
      placeholder: 'Start writing here…',
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['blockquote', 'link'],
          ['clean']
        ]
      }
    });
    block.quill.on('text-change', () => markChanged(block.id));
    wrap.querySelector('.block-body').addEventListener('focusin', () => {
      wrap.classList.add('focused');
    });
    wrap.querySelector('.block-body').addEventListener('focusout', () => {
      wrap.classList.remove('focused');
    });
  }

  // ── Init CodeMirror ──
  function initCodeMirror(block, wrap) {
    const ta = wrap.querySelector(`#cm-${block.id}`);
    if (!ta) return;
    const lang = LANGUAGES.find(l => l.value === block.language) || LANGUAGES[0];
    block.cm = CodeMirror.fromTextArea(ta, {
      mode: lang.cm || 'null',
      theme: 'dracula',
      lineNumbers: true,
      indentUnit: 2,
      tabSize: 2,
      indentWithTabs: false,
      lineWrapping: false,
      autofocus: false,
    });
    block.cm.on('change', () => markChanged(block.id));
    block.cm.on('focus', () => wrap.classList.add('focused'));
    block.cm.on('blur', () => wrap.classList.remove('focused'));
  }

  // ── Change Language ──
  function changeLanguage(id, value) {
    const block = blocks.find(b => b.id === id);
    if (!block || !block.cm) return;
    block.language = value;
    const lang = LANGUAGES.find(l => l.value === value);
    block.cm.setOption('mode', lang?.cm || 'null');
    markChanged(id);
  }

  // ── Mark Changed ──
  function markChanged(id) {
    const status = document.getElementById(`status-${id}`);
    if (status) {
      status.textContent = 'unsaved';
      status.className = 'save-status show changed';
    }
  }

  // ── Save Block ──
  function saveBlock(id) {
    const block = blocks.find(b => b.id === id);
    if (!block) return;

    const output = getBlockOutput(block);
    block.savedOutput = output;
    block.saved = true;

    const status = document.getElementById(`status-${id}`);
    if (status) {
      status.textContent = 'saved';
      status.className = 'save-status show saved';
      setTimeout(() => { status.classList.remove('show'); }, 2000);
    }

    // Update preview if open
    const outputEl = document.getElementById(`output-${id}`);
    if (outputEl && outputEl.classList.contains('show')) {
      renderPreview(id, output);
    }

    showToast(`Block #${id} saved`);
    return output;
  }

  // ── Get Block Output (HTML) ──
  function getBlockOutput(block) {
    if (block.type === 'text') {
      if (!block.quill) return '';
      return block.quill.root.innerHTML;
    }

    if (block.type === 'code') {
      if (!block.cm) return '';
      const code = block.cm.getValue();
      const lang = block.language || 'plaintext';

      let highlighted;
      try {
        if (lang === 'plaintext') {
          highlighted = hljs.highlightAuto(code).value;
        } else {
          const hljsLang = lang === 'bash' ? 'bash' :
                           lang === 'cpp'  ? 'cpp'  :
                           lang === 'typescript' ? 'typescript' : lang;
          highlighted = hljs.highlight(code, { language: hljsLang, ignoreIllegals: true }).value;
        }
      } catch(e) {
        highlighted = hljs.highlightAuto(code).value;
      }

      return `<div class="prv-cb"><div class="prv-cb-h"><span>${lang}</span></div><pre><code class="hljs language-${lang}">${highlighted}</code></pre></div>`;
    }

    return '';
  }

  // ── Toggle Preview ──
  function togglePreview(id) {
    const outputEl = document.getElementById(`output-${id}`);
    if (!outputEl) return;

    const isShown = outputEl.classList.contains('show');
    if (isShown) {
      outputEl.classList.remove('show');
    } else {
      const block = blocks.find(b => b.id === id);
      const html = getBlockOutput(block);
      renderPreview(id, html);
      outputEl.classList.add('show');
    }
  }

  function renderPreview(id, html) {
    const contentEl = document.getElementById(`output-content-${id}`);
    if (contentEl) contentEl.innerHTML = html;
  }

  // ── Delete Block ──
  function deleteBlock(id) {
    const idx = blocks.findIndex(b => b.id === id);
    if (idx === -1) return;
    blocks.splice(idx, 1);
    const el = document.getElementById(`block-${id}`);
    if (el) {
      el.style.opacity = '0';
      el.style.transform = 'scale(0.96)';
      el.style.transition = 'all 0.15s ease';
      setTimeout(() => el.remove(), 150);
    }
    updateEmptyState();
    updateBlockCount();
  }

  // ── Save All ──
  function saveAllBlocks() {
    if (blocks.length === 0) { showToast('No blocks to save'); return; }
    const outputs = blocks.map(b => ({ id: b.id, type: b.type, output: saveBlock(b.id) }));
    showToast(`All ${blocks.length} blocks saved`);
    return outputs;
  }

  // ── Export All ──
  function exportAllBlocks() {
    if (blocks.length === 0) { showToast('No blocks to export'); return; }
    const all = blocks.map(b => {
      const label = document.querySelector(`#block-${b.id} .block-label-input`)?.value || `Block ${b.id}`;
      return `<!-- Block: ${label} (${b.type}) -->\n${getBlockOutput(b)}`;
    }).join('\n\n');

    const blob = new Blob([all], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'blocks-export.html';
    a.click(); URL.revokeObjectURL(url);
    showToast('Exported as HTML');
  }

  // ── Empty state ──
  function updateEmptyState() {
    const container = document.getElementById('blocks-container');
    const existing = document.getElementById('empty-state');
    if (existing) existing.remove();
    if (blocks.length === 0) {
      const es = document.createElement('div');
      es.id = 'empty-state';
      es.className = 'empty-state';
      es.innerHTML = `
        <div class="empty-state-icon">✦</div>
        <h3>No blocks yet</h3>
        <p>Add a text or code block to start building</p>
      `;
      container.appendChild(es);
    }
  }

  // ── Block count ──
  function updateBlockCount() {
    const el = document.getElementById('block-count');
    if (el) el.textContent = `${blocks.length} block${blocks.length !== 1 ? 's' : ''}`;
  }

  // ── Toast ──
  function showToast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast success';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(10px)';
      toast.style.transition = 'all 0.2s ease';
      setTimeout(() => toast.remove(), 200);
    }, 2500);
  }

  // ── Public API ──
  window.BlockEditor = {
    getOutput: (id) => {
      const b = blocks.find(x => x.id === id);
      return b ? getBlockOutput(b) : null;
    },
    getAllOutputs: () => blocks.map(b => ({ id: b.id, type: b.type, output: getBlockOutput(b) })),
    save: saveBlock,
    saveAll: saveAllBlocks,
    addTextBlock: () => addBlock('text'),
    addCodeBlock: () => addBlock('code'),
    deleteBlock,
    getBlocks: () => blocks.map(b => ({ id: b.id, type: b.type })),
  };

  // ── Init ──
  updateEmptyState();
  updateBlockCount();
</script>
</body>
</html>
